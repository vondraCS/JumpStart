<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>JumpStart</title>
    <script>
      // GitHub Pages SPA redirect
      // Saves the full path and redirects to index.html
      sessionStorage.redirect = location.href;
      location.replace(location.pathname.split('/').slice(0, 2).join('/') + '/');
    </script>
  </head>
  <body></body>
</html>
